<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collected — Nate Holland</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Helvetica, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            background: #fff;
            color: #000;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout ────────────────────────────────────── */
        #app { display: block; }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            height: 100vh;
            padding: 0 0 0 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            z-index: 100;
            background: #fff;
        }

        .filter-btn {
            background: none;
            border: none;
            font-family: inherit;
            font-size: 16px;
            font-weight: 400;
            cursor: pointer;
            color: rgba(0,0,0,0.18);
            letter-spacing: -0.02em;
            text-transform: uppercase;
            text-align: left;
            padding: 3px 0;
            line-height: 1;
            transition: color 0.2s ease;
            width: max-content;
        }

        .filter-btn:hover  { color: rgba(0,0,0,0.55); }
        .filter-btn.active { color: #000; }

        .filter-btn:nth-child(1) { transform: translateX(0px);  }
        .filter-btn:nth-child(2) { transform: translateX(32px); }
        .filter-btn:nth-child(3) { transform: translateX(56px); }
        .filter-btn:nth-child(4) { transform: translateX(44px); }
        .filter-btn:nth-child(5) { transform: translateX(18px); }

        /* ── Grid ──────────────────────────────────────── */
        #grid-wrap {
            margin-left: 40%;
            padding: 0 48px 80px 0;
        }

        #grid {
            position: relative;
            width: 100%;
        }

        /* ── Cards (grid view) ──────────────────────────── */
        .card {
            position: absolute;
            overflow: hidden;
            background: #fff;
            display: block;
            text-decoration: none;
            cursor: pointer;
            transition: filter 0.35s ease, opacity 0.35s ease;
        }

        .card img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card.product { background: #fff; }
        .card.product img { padding: 8px; }

        /* ── Isolation mode ─────────────────────────────── */
        body.isolating .card:not(.active-card) {
            filter: blur(6px);
            opacity: 0.25;
            pointer-events: none;
        }

        body.isolating .card.active-card {
            z-index: 500 !important;
        }

        /* ── Isolation panel ────────────────────────────── */
        #isolate-panel {
            position: fixed;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 600;
            pointer-events: none;
            opacity: 0;
        }

        body.isolating #isolate-panel { pointer-events: auto; }

        .iso-btn {
            width: 40px; height: 40px;
            border-radius: 100px;
            background: #fff;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0px 12px 16px -4px rgba(0,0,0,0.08), 0px 4px 6px -2px rgba(0,0,0,0.03), 0px 2px 2px -1px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .iso-btn svg {
            width: 15px; height: 15px;
            stroke: #000; fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #iso-delete svg { stroke: rgba(0,0,0,0.5); }
        #iso-delete:hover svg { stroke: #000; }

        /* ── List view ──────────────────────────────────── */
        .list-view {
            padding-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 12px 0;
            text-decoration: none;
            color: inherit;
            will-change: transform;
        }

        .list-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .list-item-title {
            font-size: 32px;
            font-weight: 400;
            letter-spacing: -0.03em;
            color: rgba(0,0,0,0.15);
            transition: color 0.2s ease;
            line-height: 1;
            text-transform: uppercase;
        }

        .list-item-arrow {
            font-size: 14px;
            color: rgba(0,0,0,0.15);
            transition: color 0.2s ease, transform 0.15s ease;
            flex-shrink: 0;
        }

        .list-favicon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            flex-shrink: 0;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }

        .list-delete {
            background: none;
            border: none;
            color: rgba(0,0,0,0.2);
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
        }

        .list-item:hover .list-delete { opacity: 1; }
        .list-delete:hover { color: #000; }

        .list-item:hover .list-favicon { opacity: 1; }
        .list-item:hover .list-item-title { color: #000; }
        .list-item:hover .list-item-arrow { color: #000; transform: translate(3px, -3px); }

        .empty {
            padding: 80px 0;
            color: rgba(0,0,0,0.28);
            font-size: 13px;
        }

        /* ── Bottom fade ─────────────────────────────────── */
        #bottom-fade {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 160px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.85) 50%, #fff);
            pointer-events: none;
            z-index: 250;
        }

        /* ── FAB ─────────────────────────────────────────── */
        #fab-root {
            position: fixed;
            bottom: 40px;
            left: 0; right: 0;
            height: 40px;
            pointer-events: none;
            z-index: 300;
        }

        #fab-btn {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 40px;
            border-radius: 100px;
            background: #080808;
            color: #fff;
            border: 1px solid rgba(0,0,0,0.73);
            box-shadow: 0px 12px 16px -4px rgba(0,0,0,0.08), 0px 4px 6px -2px rgba(0,0,0,0.03), 0px 2px 2px -1px rgba(0,0,0,0.04);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        #fab-icon { display: block; line-height: 1; }

        .fab-pill {
            position: absolute;
            top: 0;
            height: 40px;
            width: 40px;
            border-radius: 20px;
            background: #fff;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0px 12px 16px -4px rgba(0,0,0,0.08), 0px 4px 6px -2px rgba(0,0,0,0.03), 0px 2px 2px -1px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            pointer-events: auto;
        }

        /* pill-url anchored on right → expands leftward */
        #pill-url { right: calc(50% + 30px); }

        /* pill-img anchored on left → expands rightward; icon stays left */
        #pill-img { left: calc(50% + 30px); }

        .fab-pill.expanded { cursor: default; }

        .pill-track {
            display: flex;
            align-items: center;
            width: 380px;
            flex-shrink: 0;
        }

        .pill-icon {
            width: 38px; height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .pill-icon svg {
            width: 15px; height: 15px;
            stroke: #000; fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .pill-form {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 12px;
            flex: 1;
            opacity: 0;
            pointer-events: none;
            min-width: 0;
        }

        .fab-pill.expanded .pill-form { pointer-events: auto; }

        .pill-input {
            flex: 1;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 12px;
            color: #000;
            background: none;
            min-width: 0;
        }

        .pill-input::placeholder { color: rgba(0,0,0,0.28); }

        .pill-cat-trigger {
            background: rgba(0,0,0,0.06);
            border: none;
            border-radius: 10px;
            padding: 5px 9px;
            font-family: inherit;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: rgba(0,0,0,0.55);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .pill-cat-trigger:hover { background: rgba(0,0,0,0.1); }

        .pill-add {
            background: #000;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 6px 14px;
            font-family: inherit;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            flex-shrink: 0;
        }

        .pill-add:hover { background: #333; }

        .pill-status {
            font-size: 11px;
            color: rgba(0,0,0,0.3);
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 12px;
        }

        /* ── Image pill file picker ─────────────────────── */
        .pill-file-label {
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .pill-file-input { display: none; }

        .pill-img-thumb {
            width: 26px; height: 26px;
            border-radius: 6px;
            background: rgba(0,0,0,0.06);
            border: 1px dashed rgba(0,0,0,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.15s;
        }

        .pill-file-label:hover .pill-img-thumb { background: rgba(0,0,0,0.1); }

        .pill-img-thumb svg {
            width: 13px; height: 13px;
            stroke: rgba(0,0,0,0.35); fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .pill-img-thumb img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
        }

        .pill-img-thumb.has-image { border-style: solid; border-color: rgba(0,0,0,0.12); background: none; }
        .pill-img-thumb.has-image svg { display: none; }
        .pill-img-thumb.has-image img { display: block; }

        .pill-cat-menu {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0;
            background: #fff;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 14px;
            padding: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-width: 200px;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .pill-cat-menu.open { pointer-events: auto; }

        .pill-cat-opt {
            padding: 5px 12px;
            border-radius: 10px;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: rgba(0,0,0,0.5);
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
        }

        .pill-cat-opt.selected { background: #000; color: #fff; }
        .pill-cat-opt:hover:not(.selected) { background: rgba(0,0,0,0.06); color: #000; }

        /* ── Curtain transition ─────────────────────────── */
        #curtain {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 1000;
            pointer-events: none;
            transform-origin: top;
        }

        /* ── Desk tag ───────────────────────────────────── */
        #desk-tag {
            position: fixed;
            top: 28px;
            left: 30px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #desk-tag span,
        #desk-tag a {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            line-height: 1;
            color: rgba(0,0,0,0.18);
            text-decoration: none;
            display: block;
            transition: color 0.2s ease;
        }

        #desk-tag a {
            font-style: italic;
        }

        #desk-tag span { transform: translateX(0px); }
        #desk-tag a    { transform: translateX(36px); }

        #desk-tag a:hover { color: rgba(0,0,0,0.55); }

        @media (max-width: 600px) {
            #desk-tag { display: none; }
            nav {
                position: static;
                width: 100%;
                height: auto;
                padding: 28px 20px 16px;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 6px 14px;
            }
            .filter-btn { font-size: 14px; transform: none !important; }
            #grid-wrap  { margin-left: 0; padding: 0 16px 60px; }
            #fab-root   { bottom: 24px; }
        }
    </style>
</head>
<body>

<div id="curtain"></div>

<div id="desk-tag">
    <span>Collected by</span>
    <a href="/" id="desk-link">Nate Holland</a>
</div>

<div id="app">
    <nav>
        <button class="filter-btn" data-cat="inspiration">Inspiration</button>
        <button class="filter-btn active" data-cat="typography">Typography</button>
        <button class="filter-btn" data-cat="mockups">Mockups</button>
        <button class="filter-btn" data-cat="interior">Interior</button>
        <button class="filter-btn" data-cat="fashion">Fashion</button>
    </nav>
    <div id="grid-wrap">
        <div id="grid"></div>
    </div>
</div>

<div id="bottom-fade"></div>

<div id="isolate-panel">
    <button class="iso-btn" id="iso-delete" title="Remove">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>

    <button class="iso-btn" id="iso-link" title="Open link" style="display:none">

    </button>
</div>

<div id="fab-root">
    <div class="fab-pill" id="pill-url">
        <div class="pill-track">
            <div class="pill-icon">
                <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>

        </div>

    </div>
    <div class="fab-pill" id="pill-img">
        <div class="pill-track">
            <div class="pill-icon">

                <button class="pill-cat-trigger">Category</button>
                <button class="pill-add">Add</button>
            </div>
        </div>
        <div class="pill-cat-menu"></div>
    </div>
    <button id="fab-btn"><span id="fab-icon">+</span></button>
</div>

<script>

    // { title, url, category, image? }

    // ── Persistence (localStorage fallback) ──────────────
    const STORAGE_KEY = 'archive_custom_items';

    function loadLocalItems() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
    }

    async function fetchRemoteItems() {
        try {
            const { data, error } = await db.from('items').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            return data || [];
        } catch { return []; }
    }

    async function saveRemoteItem(item) {
        const { error } = await db.from('items').insert([item]);
        if (error) throw error;
    }

    async function deleteRemoteItem(item) {
        if (item.id) {
            await db.from('items').delete().eq('id', item.id);
        }
    }

    let customItems = loadLocalItems(); // start with local, replace when remote loads
    let items = [...DEFAULT_ITEMS, ...customItems];

    // ── Helpers ──────────────────────────────────────────
    function domain(url) {
        try { return new URL(url).hostname.replace('www.', ''); }
        catch { return url; }
    }

    // ── Render ───────────────────────────────────────────
    let activeCategory = 'typography';

    const GRID_CATS = new Set(['inspiration', 'interior', 'fashion']);

    function render(cat) {
        const container = document.getElementById('grid');
        const filtered  = cat === 'all' ? items : items.filter(i => i.category === cat);
        container.innerHTML = '';
        container.style.height = 'auto';

        if (!filtered.length) {
            container.innerHTML = '<p class="empty">Nothing here yet.</p>';
            return;
        }

        const useGrid = GRID_CATS.has(cat);

        if (useGrid) {
            renderGrid(container, filtered);
        } else {
            renderList(container, filtered, cat);
        }
    }

    function renderGrid(container, filtered) {
        const totalW         = container.offsetWidth;
        const cols           = 3;
        const gutter         = 20;
        const colW           = (totalW - gutter * (cols - 1)) / cols;
        const minFrac        = 0.60;
        const maxFrac        = 0.92;
        const minSpaceBefore = 10;
        const maxSpaceBefore = 90;
        const minSpaceAfter  = 0;
        const maxSpaceAfter  = 40;
        const colY = [40, 70, 20];

        filtered.forEach((item, i) => {
            const colIdx  = i % cols;
            const frac    = minFrac + Math.random() * (maxFrac - minFrac);
            const cardW   = colW * frac;
            const aspect  = 1.25; // fixed aspect ratio — full image always visible
            const cardH   = cardW * aspect;
            const colStart = colIdx * (colW + gutter);
            const x       = colStart + (colW - cardW) * (0.1 + Math.random() * 0.8);
            const y       = colY[colIdx] + minSpaceBefore + Math.random() * (maxSpaceBefore - minSpaceBefore);

            const el = document.createElement('a');
            el.className = 'card';
            el.href = item.url;
            el.target = '_blank';
            el.rel = 'noopener';
            el.style.cssText = `left:${x}px;top:${y}px;width:${cardW}px;height:${cardH}px;z-index:${i + 1};`;

            const isCustom = customItems.includes(item);
            // Pure image — no labels, no overlays
            if (item.image) {
                if (item.price != null) el.classList.add('product');
                if (item.url === '#')   el.href = 'javascript:void(0)';
                el.innerHTML = `<img src="${item.image}" alt="${item.title}">`;
            } else {
                el.innerHTML = `<img src="" alt="" style="display:none">`;
            }

            // Click → isolate
            el.addEventListener('click', e => {
                e.preventDefault();
                isolate(el, item);
            });

            container.appendChild(el);
            colY[colIdx] = y + cardH + minSpaceAfter + Math.random() * (maxSpaceAfter - minSpaceAfter);
        });

        container.style.height = (Math.max(...colY) + 60) + 'px';
    }

    let listItems = []; // track for scroll animation

    function renderList(container, filtered, cat) {
        const showFavicon = cat === 'typography' || cat === 'mockups';
        const wrap = document.createElement('div');
        wrap.className = 'list-view';
        listItems = [];

        filtered.forEach((item, i) => {
            const el = document.createElement('a');
            el.className = 'list-item';
            el.href = item.url;
            el.target = '_blank';
            el.rel = 'noopener';
            el.dataset.index = i;

            const faviconHtml = showFavicon
                ? `<img class="list-favicon" src="https://www.google.com/s2/favicons?sz=64&domain=${domain(item.url)}" alt="" width="32" height="32">`
                : '';

            const isCustom = customItems.includes(item);
            el.innerHTML = `
                <span class="list-item-left">
                    ${faviconHtml}
                    <span class="list-item-title">${item.title}</span>
                </span>
                ${isCustom ? '<button class="list-delete">×</button>' : ''}`;

            if (isCustom) {
                el.querySelector('.list-delete').addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    removeItem(item);
                });
            }
            wrap.appendChild(el);
            listItems.push(el);
        });

        container.appendChild(wrap);
        updateListWave();
    }

    async function removeItem(item) {
        customItems = customItems.filter(c => c !== item);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(customItems));
        await deleteRemoteItem(item);
        items = [...DEFAULT_ITEMS, ...customItems];
        render(activeCategory);
    }

    // ── Isolation ────────────────────────────────────────
    const isolatePanel  = document.getElementById('isolate-panel');
    const isoDeleteBtn  = document.getElementById('iso-delete');
    const isoLinkBtn    = document.getElementById('iso-link');
    let   activeCard    = null;
    let   activeItem    = null;

    function isolate(el, item) {
        if (activeCard) deisolate(false);
        activeCard = el;
        activeItem = item;
        el.classList.add('active-card');
        document.body.classList.add('isolating');

        isoDeleteBtn.onclick = async () => {
            deisolate();
            await removeItem(item);
        };

        const hasLink = item.url && item.url !== '#';
        if (hasLink) {
            isoLinkBtn.style.display = 'flex';
            isoLinkBtn.onclick = () => window.open(item.url, '_blank');
        } else {
            isoLinkBtn.style.display = 'none';
        }

        // Position panel right beside the card
        const rect       = el.getBoundingClientRect();
        const panelH     = hasLink ? 90 : 40; // approx: 40px btn + 10px gap + 40px btn
        const gap        = 12;
        const spaceRight = window.innerWidth - rect.right;
        const left       = spaceRight > 64
            ? rect.right + gap                   // place right of card
            : rect.left - 40 - gap;              // fall back to left of card
        const top        = rect.top + rect.height / 2 - panelH / 2;

        gsap.set(isolatePanel, { left, top });
        gsap.fromTo(isolatePanel,
            { opacity: 0, x: spaceRight > 64 ? 10 : -10 },
            { opacity: 1, x: 0, duration: 0.4, ease: 'power3.out' }
        );
    }

    function deisolate(animate = true) {
        if (activeCard) activeCard.classList.remove('active-card');
        activeCard = null;
        activeItem = null;
        document.body.classList.remove('isolating');
        if (animate) gsap.to(isolatePanel, { opacity: 0, x: 16, duration: 0.25, ease: 'power2.in' });
    }

    function updatePanelPos() {
        if (!activeCard) return;
        const hasLink = activeItem && activeItem.url && activeItem.url !== '#';
        const panelH  = hasLink ? 90 : 40;
        const gap     = 12;
        const rect    = activeCard.getBoundingClientRect();
        const spaceRight = window.innerWidth - rect.right;
        const left    = spaceRight > 64 ? rect.right + gap : rect.left - 40 - gap;
        const top     = rect.top + rect.height / 2 - panelH / 2;
        gsap.set(isolatePanel, { left, top });
    }

    window.addEventListener('scroll', updatePanelPos, { passive: true });

    document.addEventListener('click', e => {
        if (!document.body.classList.contains('isolating')) return;
        if (!e.target.closest('.active-card') && !e.target.closest('#isolate-panel')) {
            deisolate();
        }
    });

    function updateListWave() {
        if (!listItems.length) return;
        const scrollY   = window.scrollY;
        const maxScroll = Math.max(1, document.body.scrollHeight - window.innerHeight);
        const progress  = scrollY / maxScroll;

        listItems.forEach((el, i) => {
            const x = (Math.sin(i * 1.1 + progress * Math.PI * 6) * 0.5 + 0.5) * 60;
            el.style.transform = `translateX(${x}px)`;
        });
    }

    window.addEventListener('scroll', updateListWave, { passive: true });

    // ── Filters ──────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCategory = btn.dataset.cat;
            if (typeof deisolate === 'function') deisolate();
            render(activeCategory);
        });
    });

    window.addEventListener('resize', () => { render(activeCategory); updateListWave(); });

    // ── Init ─────────────────────────────────────────────
    render(activeCategory);

    // Load remote items from Supabase and re-render
    (async () => {
        const remote = await fetchRemoteItems();
        if (remote.length) {
            customItems = remote;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(customItems));
            items = [...DEFAULT_ITEMS, ...customItems];
            render(activeCategory);
        }
    })();

    // ── FAB ──────────────────────────────────────────────
    const ALL_CATS   = ['inspiration','typography','mockups','interior','fashion'];
    const IMAGE_CATS = ['inspiration','interior','fashion'];
    const PRODUCT_CATS = new Set(['interior','fashion']);

    let fabOpen      = false;
    let expandedPill = null;

    const fabBtn  = document.getElementById('fab-btn');
    const fabIcon = document.getElementById('fab-icon');
    const pillUrl = document.getElementById('pill-url');
    const pillImg = document.getElementById('pill-img');
    const pills   = [pillImg, pillUrl]; // img closer to button

    // pill-url slides LEFT out from behind button; pill-img slides RIGHT
    gsap.set(pillUrl, { x:  60, opacity: 0 });
    gsap.set(pillImg, { x: -60, opacity: 0 });

    function openFab() {
        fabOpen = true;
        gsap.to(fabIcon, { rotation: 45, duration: 0.3, ease: 'back.out(2)' });
        gsap.to(pillUrl, { x: 0, opacity: 1, duration: 0.7, ease: 'power3.out' });
        gsap.to(pillImg, { x: 0, opacity: 1, duration: 0.7, ease: 'power3.out', delay: 0.07 });
    }

    function closeFab() {
        fabOpen = false;
        if (expandedPill) collapsePill(expandedPill);
        gsap.to(fabIcon, { rotation: 0, duration: 0.25, ease: 'power2.out' });
        gsap.to(pillUrl, { x:  60, opacity: 0, duration: 0.35, ease: 'back.in(1.5)' });
        gsap.to(pillImg, { x: -60, opacity: 0, duration: 0.35, ease: 'back.in(1.5)', delay: 0.04 });
    }

    fabBtn.addEventListener('click', () => fabOpen ? closeFab() : openFab());
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && fabOpen) closeFab(); });

    function expandPill(pill) {
        if (expandedPill && expandedPill !== pill) collapsePill(expandedPill);
        expandedPill = pill;
        pill.classList.add('expanded');

        // Each pill has half the viewport minus button-half (20px) minus gap (10px) minus margin (12px)
        const maxW = Math.min(380, window.innerWidth / 2 - 42);
        // Set track to match so content doesn't overflow after overflow:visible
        gsap.set(pill.querySelector('.pill-track'), { width: maxW });

        gsap.to(pill, { width: maxW, duration: 0.5, ease: 'power3.out',
            onComplete: () => { pill.style.overflow = 'visible'; }
        });
        gsap.to(pill.querySelector('.pill-form'), { opacity: 1, duration: 0.2, delay: 0.3 });
        setTimeout(() => pill.querySelector('.pill-input').focus(), 380);
    }

    function collapsePill(pill) {
        if (!pill) return;
        pill.classList.remove('expanded');
        pill.style.overflow = 'hidden';
        const menu = pill.querySelector('.pill-cat-menu');
        menu.classList.remove('open');
        gsap.to(menu, { opacity: 0, y: 6, duration: 0.1 });
        gsap.to(pill.querySelector('.pill-form'), { opacity: 0, duration: 0.12 });
        gsap.to(pill, { width: 40, duration: 0.3, ease: 'expo.in',
            onComplete: () => gsap.set(pill.querySelector('.pill-track'), { clearProps: 'width' })
        });
        expandedPill = null;
    }

    async function autoFetch(url, pill) {
        const status = pill.querySelector('.pill-status');
        status.textContent = '…';
        try {
            const res  = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const html = data.contents || '';
            const get  = a => { const m = html.match(new RegExp(a + '[^>]*content="([^"]+)"')); return m ? m[1] : null; };

            pill._title = (get('og:title') || '').split(' - ')[0].trim();
            pill._image = get('og:image');
            const pm    = html.match(/"price":"([^"]+)"/);
            const sym   = url.includes('/es/') ? '€' : url.includes('/gb/') ? '£' : '$';
            pill._price = pm ? sym + pm[1] : null;
            status.textContent = pill._title ? '✓' : '';
        } catch { status.textContent = ''; }
    }

    function setupPill(pill, type) {
        const cats       = type === 'image' ? IMAGE_CATS : ALL_CATS;
        const input      = pill.querySelector('.pill-input');
        const catTrigger = pill.querySelector('.pill-cat-trigger');
        const catMenu    = pill.querySelector('.pill-cat-menu');
        const addBtn     = pill.querySelector('.pill-add');
        let selectedCat  = cats[0];
        let catOpen      = false;

        catTrigger.textContent = cats[0];

        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'pill-cat-opt' + (cat === cats[0] ? ' selected' : '');
            btn.textContent = cat;
            btn.addEventListener('click', e => {
                e.stopPropagation();
                catMenu.querySelectorAll('.pill-cat-opt').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedCat = cat;
                catTrigger.textContent = cat;
                closeDropdown();
            });
            catMenu.appendChild(btn);
        });

        function openDropdown() {
            catOpen = true;
            catMenu.classList.add('open');
            gsap.fromTo(catMenu, { y: 8, opacity: 0 }, { y: 0, opacity: 1, duration: 0.22, ease: 'power2.out' });
        }

        function closeDropdown() {
            catOpen = false;
            catMenu.classList.remove('open');
            gsap.to(catMenu, { y: 8, opacity: 0, duration: 0.15 });
        }

        catTrigger.addEventListener('click', e => {
            e.stopPropagation();
            catOpen ? closeDropdown() : openDropdown();
        });

        document.addEventListener('click', e => {
            if (catOpen && !catMenu.contains(e.target) && e.target !== catTrigger) closeDropdown();
        });

        // Expand pill on click (only when not already expanded)
        pill.addEventListener('click', () => {
            if (!fabOpen || expandedPill === pill) return;
            expandPill(pill);
        });

        // Auto-fetch on blur
        input.addEventListener('blur', () => {
            const url = input.value.trim();
            if (url.startsWith('http')) autoFetch(url, pill);
        });

        // Submit
        addBtn.addEventListener('click', async e => {
            e.stopPropagation();
            const url = input.value.trim();
            if (!url) { input.focus(); return; }

            let title = pill._title || '';
            if (!title) {
                try { title = new URL(url).hostname.replace('www.','').split('.')[0]; } catch {}
                title = title.charAt(0).toUpperCase() + title.slice(1);
            }

            const newItem = { title, url, category: selectedCat };
            if (type === 'image' && pill._image) newItem.image = pill._image;
            if (type === 'image' && pill._price)  newItem.price = pill._price;

            // Save to Supabase, get back id; also keep local copy
            try {
                const { data } = await db.from('items').insert([newItem]).select().single();
                if (data) newItem.id = data.id;
            } catch {}
            customItems.push(newItem);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(customItems));
            items = [...DEFAULT_ITEMS, ...customItems];

            // reset
            input.value = '';
            pill._title = pill._image = pill._price = null;
            pill.querySelector('.pill-status').textContent = '';

            closeFab();
            if (activeCategory === selectedCat) render(activeCategory);
        });
    }

    setupPill(pillUrl, 'url');

    function setupImgPill(pill) {
        const cats       = IMAGE_CATS;
        const fileInput  = pill.querySelector('.pill-file-input');
        const thumb      = pill.querySelector('.pill-img-thumb');
        const preview    = pill.querySelector('#img-preview');
        const titleInput = pill.querySelector('#img-title-input');
        const catTrigger = pill.querySelector('.pill-cat-trigger');
        const catMenu    = pill.querySelector('.pill-cat-menu');
        const addBtn     = pill.querySelector('.pill-add');
        let selectedCat  = cats[0];
        let catOpen      = false;
        let imageData    = null; // base64

        catTrigger.textContent = cats[0];

        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'pill-cat-opt' + (cat === cats[0] ? ' selected' : '');
            btn.textContent = cat;
            btn.addEventListener('click', e => {
                e.stopPropagation();
                catMenu.querySelectorAll('.pill-cat-opt').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedCat = cat;
                catTrigger.textContent = cat;
                closeDropdown();
            });
            catMenu.appendChild(btn);
        });

        function openDropdown() {
            catOpen = true;
            catMenu.classList.add('open');
            gsap.fromTo(catMenu, { y: 8, opacity: 0 }, { y: 0, opacity: 1, duration: 0.22, ease: 'power2.out' });
        }
        function closeDropdown() {
            catOpen = false;
            catMenu.classList.remove('open');
            gsap.to(catMenu, { y: 8, opacity: 0, duration: 0.15 });
        }

        catTrigger.addEventListener('click', e => {
            e.stopPropagation();
            catOpen ? closeDropdown() : openDropdown();
        });
        document.addEventListener('click', e => {
            if (catOpen && !catMenu.contains(e.target) && e.target !== catTrigger) closeDropdown();
        });

        // Expand pill on click (when not expanded)
        pill.addEventListener('click', () => {
            if (!fabOpen || expandedPill === pill) return;
            expandPill(pill);
        });

        // File selected → read as base64 + show thumbnail
        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;
            // Auto-fill title from filename if blank
            if (!titleInput.value) {
                titleInput.value = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
            }
            const reader = new FileReader();
            reader.onload = e => {
                imageData = e.target.result;
                preview.src = imageData;
                thumb.classList.add('has-image');
            };
            reader.readAsDataURL(file);
        });

        // Submit
        addBtn.addEventListener('click', async e => {
            e.stopPropagation();
            if (!imageData) { fileInput.click(); return; }

            let title = titleInput.value.trim();
            if (!title) title = 'Untitled';

            const newItem = { title, url: '#', category: selectedCat, image: imageData };
            try {
                const { data } = await db.from('items').insert([newItem]).select().single();
                if (data) newItem.id = data.id;
            } catch {}
            customItems.push(newItem);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(customItems));
            items = [...DEFAULT_ITEMS, ...customItems];

            // reset
            fileInput.value = '';
            titleInput.value = '';
            imageData = null;
            preview.src = '';
            thumb.classList.remove('has-image');

            closeFab();
            if (activeCategory === selectedCat) render(activeCategory);
        });
    }

    setupImgPill(pillImg);

    // ── Page transition ───────────────────────────────────
    const curtain = document.getElementById('curtain');

    // Fade in on load
    gsap.fromTo(curtain,
        { scaleY: 1 },
        { scaleY: 0, duration: 0.7, ease: 'expo.inOut', transformOrigin: 'top' }
    );

    document.getElementById('desk-link').addEventListener('click', e => {
        e.preventDefault();
        const href = e.currentTarget.href;
        gsap.to(curtain, {
            scaleY: 1,
            duration: 0.6,
            ease: 'expo.inOut',
            transformOrigin: 'bottom',
            onComplete: () => window.location.href = href
        });
    });
</script>
</body>
</html>
