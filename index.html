<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nate</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%238B5CF6'/></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fff;
            color: #000;
            font-family: Helvetica, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 16px;
            padding: 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .bio {
            white-space: nowrap;
        }

        .prev {
            opacity: 0.65;
            font-size: 14px;
            margin-top: 4px;
        }

        .social a {
            color: #000;
            text-decoration: none;
            display: block;
            text-align: right;
        }

        .social a:hover {
            text-decoration: underline;
        }

        .trail-img {
            position: fixed;
            pointer-events: none;
            width: 200px;
            height: 150px;
            object-fit: cover;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="bottom">
        <div>
            <p class="bio">Nate Holland — Brand Designer @ Revolut</p>
            <p class="bio prev">Designed for Series Eight, Wedge, NoTwoWays, Tottenham Hotspurs, OpenFortune, Preply & Asda</p>
        </div>
        <div class="social">
            <a href="https://www.linkedin.com/in/nathan-holland-59980995/" target="_blank">LinkedIn</a>
            <a href="mailto:hello@nate-holland.com">Email</a>
            <a href="https://x.com/nateh0lland" target="_blank">X</a>
            <a href="https://www.cosmos.so/nateh0lland" target="_blank">Cosmos</a>
        </div>
    </div>
    <script>
        const images = Array.from({ length: 24 }, (_, i) =>
            `Assets/portfolio_img_${String(i + 1).padStart(2, '0')}.jpg`
        ).sort(() => Math.random() - 0.5);

        const threshold = 160;
        const halfX = 100;
        const halfY = 75;
        let imageIndex = 0;
        const lastMousePos = { x: 0, y: 0 };

        // — Trail —
        document.addEventListener('mousemove', (e) => {
            if (isHolding) return;

            const x = e.clientX;
            const y = e.clientY;
            const dist = Math.hypot(x - lastMousePos.x, y - lastMousePos.y);
            if (dist < threshold) return;

            const angle = Math.atan2(y - lastMousePos.y, x - lastMousePos.x);
            const lag = 60;
            const fromX = x - Math.cos(angle) * lag;
            const fromY = y - Math.sin(angle) * lag;
            const duration = 1500 + Math.random() * 1500;

            spawnTrailImage(fromX, fromY, x, y, duration);

            lastMousePos.x = x;
            lastMousePos.y = y;
        });

        function spawnTrailImage(fromX, fromY, toX, toY, duration) {
            const el = document.createElement('img');
            el.src = images[imageIndex % images.length];
            el.style.cssText = `position:fixed;left:0;top:0;width:200px;height:150px;object-fit:cover;pointer-events:none;z-index:${imageIndex};`;
            document.body.appendChild(el);
            imageIndex++;

            el.animate([
                { transform: `translate(${fromX - halfX}px, ${fromY - halfY}px)`, opacity: 0, offset: 0    },
                { transform: `translate(${toX - halfX}px,   ${toY - halfY}px)`,   opacity: 1, offset: 0.15 },
                { transform: `translate(${toX - halfX}px,   ${toY - halfY}px)`,   opacity: 1, offset: 0.85 },
                { transform: `translate(${toX - halfX}px,   ${toY - halfY}px)`,   opacity: 0, offset: 1    }
            ], { duration, easing: 'ease-out', fill: 'forwards' }).onfinish = () => el.remove();
        }

        // — Click & hold explosion —
        let isHolding = false;
        let holdInterval = null;
        const heldImages = [];
        let holdOrigin = { x: 0, y: 0 };

        document.addEventListener('mousedown', (e) => {
            isHolding = true;
            const cx = e.clientX;
            const cy = e.clientY;
            holdOrigin = { x: cx, y: cy };

            holdInterval = setInterval(() => {
                const ox = (Math.random() - 0.5) * 30;
                const oy = (Math.random() - 0.5) * 30;
                const el = document.createElement('img');
                el.src = images[imageIndex % images.length];
                el.style.cssText = `position:fixed;left:0;top:0;width:200px;height:150px;object-fit:cover;pointer-events:none;z-index:${1000 + heldImages.length};transform:translate(${cx - halfX + ox}px,${cy - halfY + oy}px);`;
                document.body.appendChild(el);
                heldImages.push(el);
                imageIndex++;
            }, 120);
        });

        document.addEventListener('mouseup', () => {
            if (!isHolding) return;
            isHolding = false;
            clearInterval(holdInterval);

            heldImages.forEach(el => {
                const angle  = Math.random() * Math.PI * 2;
                const tx = Math.random() * (window.innerWidth  - 200);
                const ty = Math.random() * (window.innerHeight - 150);
                const from   = el.style.transform;
                const dur    = 150 + Math.random() * 100;
                const hold   = 4000 + Math.random() * 3000;

                el.animate([
                    { transform: from,                                      opacity: 1, offset: 0 },
                    { transform: `translate(${tx}px, ${ty}px)`,            opacity: 1, offset: dur / (dur + hold) },
                    { transform: `translate(${tx}px, ${ty}px)`,            opacity: 0, offset: 1 }
                ], { duration: dur + hold, easing: 'cubic-bezier(0.1, 0, 0.3, 1)', fill: 'forwards' })
                .onfinish = () => el.remove();
            });

            heldImages.length = 0;
        });
    </script>
</body>
</html>
