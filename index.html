<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nate</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%238B5CF6'/></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            cursor: none;
        }

        #cursor {
            position: fixed;
            left: 0;
            top: 0;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cursor .cursor-inner {
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
            transition: width 0.2s ease, height 0.2s ease, border-radius 0.2s ease,
                padding 0.2s ease, background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #cursor .cursor-hint-text {
            display: none;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #fff;
            white-space: nowrap;
            padding: 0 2px;
        }

        #cursor.case-study-hint .cursor-inner {
            width: auto;
            height: auto;
            min-height: 36px;
            padding: 0 14px;
            border-radius: 999px;
            background: #000;
        }

        #cursor.case-study-hint .cursor-hint-text {
            display: block;
        }

        #cursor.holding .cursor-inner {
            width: 32px;
            height: 32px;
            min-height: 32px;
            padding: 0;
            border-radius: 50%;
        }

        #cursor.holding .cursor-hint-text {
            display: none;
        }

        #cursor.holding.case-study-hint .cursor-inner {
            width: 32px;
            height: 32px;
        }

        #cursor.over-links:not(.case-study-hint) .cursor-inner {
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.3);
        }

        #cursor.over-links:not(.case-study-hint) .cursor-hint-text {
            display: none;
        }

        body {
            background: #fff;
            color: #000;
            font-family: Helvetica, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 16px;
            padding: 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .bio {
            white-space: nowrap;
        }

        .prev {
            opacity: 0.65;
            font-size: 14px;
            margin-top: 4px;
        }

        .social a {
            color: #000;
            text-decoration: none;
            display: block;
            text-align: right;
        }

        .social a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body {
                cursor: auto;
            }

            #cursor {
                display: none;
            }

            .bio {
                white-space: normal;
            }

            .bottom {
                flex-direction: column;
                gap: 24px;
            }

            .social a {
                text-align: left;
            }
        }

        .trail-img {
            position: fixed;
            pointer-events: none;
            width: 200px;
            height: 150px;
            object-fit: cover;
        }

        #toggle-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: none;
            border: none;
            padding: 0;
            cursor: none;
            z-index: 20000;
            opacity: 0.4;
            transition: opacity 0.2s;
        }

        #toggle-btn:hover {
            opacity: 1;
        }

        #toggle-btn svg {
            display: block;
        }

        .scatter-img {
            position: fixed;
            width: 200px;
            height: 150px;
            object-fit: cover;
            pointer-events: all;
            z-index: 9000;
            cursor: grab;
            transform-origin: center center;
            transition: left 0.7s cubic-bezier(0.2, 0, 0.3, 1),
                        top  0.7s cubic-bezier(0.2, 0, 0.3, 1),
                        transform 0.7s cubic-bezier(0.2, 0, 0.3, 1),
                        opacity 0.4s ease;
        }

        .scatter-img.dragging {
            cursor: grabbing;
            transition: none;
        }

        .scatter-img.has-case-study {
            cursor: none;
        }

        #case-backdrop {
            position: fixed;
            inset: 0;
            z-index: 25000;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        #case-backdrop.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        #case-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            bottom: 20px;
            width: min(480px, calc(100vw - 40px));
            max-width: calc(100vw - 40px);
            z-index: 25001;
            background: #fff;
            color: #000;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            transform: translateX(calc(100% + 24px));
            opacity: 0;
            pointer-events: none;
            transition: transform 0.45s cubic-bezier(0.2, 0, 0.3, 1),
                opacity 0.35s ease;
        }

        #case-panel.is-open {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        #case-panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding: 24px 24px 16px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        #case-panel-title {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        #case-panel-close {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #case-panel-close:hover {
            background: rgba(0, 0, 0, 0.12);
        }

        #case-panel-body {
            padding: 20px 24px 28px;
            overflow-y: auto;
            flex: 1;
            font-size: 15px;
            line-height: 1.55;
        }

        #case-panel-body p + p {
            margin-top: 1em;
        }

        #case-panel-body .case-meta {
            font-size: 13px;
            opacity: 0.65;
            margin-bottom: 1.25em;
        }

        #case-panel-body h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 1.5em 0 0.5em;
            opacity: 0.55;
        }

        body.case-panel-open {
            overflow: hidden;
        }

        @media (max-width: 600px) {
            #toggle-btn {
                cursor: auto;
            }

            #case-panel {
                left: 20px;
                width: auto;
                max-width: none;
            }

            .scatter-img.has-case-study {
                cursor: pointer;
            }
        }
    </style>
</head>
<body>
    <div id="cursor" aria-hidden="true">
        <div class="cursor-inner">
            <span class="cursor-hint-text">View case study</span>
        </div>
    </div>

    <div id="case-backdrop" aria-hidden="true"></div>
    <aside id="case-panel" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="case-panel-title">
        <div id="case-panel-header">
            <h2 id="case-panel-title"></h2>
            <button type="button" id="case-panel-close" aria-label="Close case study">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.5"/>
                </svg>
            </button>
        </div>
        <div id="case-panel-body"></div>
    </aside>

    <button id="toggle-btn" title="View Work">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="7" height="7" fill="#000"/>
            <rect x="12" y="1" width="7" height="7" fill="#000"/>
            <rect x="1" y="12" width="7" height="7" fill="#000"/>
            <rect x="12" y="12" width="7" height="7" fill="#000"/>
        </svg>
    </button>

    <div class="bottom">
        <div>
            <p class="bio">Nate Holland — Brand Designer @ Series Eight</p>
            <p class="bio prev">Designed for Wedge, NoTwoWays, Tottenham Hotspur, OpenFortune, Preply & Asda</p>
        </div>
        <div class="social">
            <a href="https://www.linkedin.com/in/nathan-holland-59980995/" target="_blank">LinkedIn</a>
            <a href="mailto:hello@nate-holland.com">Email</a>
            <a href="https://x.com/nateh0lland" target="_blank">X</a>
            <a href="https://www.cosmos.so/nateh0lland" target="_blank">Cosmos</a>
        </div>
    </div>
    <script>
        const images = [
            'Assets/acupanel.jpg',
            'Assets/bericote.jpg',
            'Assets/crunch.jpg',
            'Assets/echo.jpg',
            'Assets/flowhub.jpg',
            'Assets/ipn.jpg',
            'Assets/maui.jpg',
            'Assets/meter.jpg',
            'Assets/NTW.jpg',
            'Assets/OpenFortune.jpg',
            'Assets/Preply.jpg',
            'Assets/splitmetrics.jpg',
            'Assets/spurs.jpg',
            'Assets/viatu.jpg'
        ].sort(() => Math.random() - 0.5);

        const CASE_STUDIES = {
            'crunch.jpg': {
                title: 'Crunch',
                bodyHtml: `
                    <p class="case-meta">Brand identity · Art direction · Digital</p>
                    <p>Crunch needed a louder, more confident presence in a crowded fitness category. The work focused on clarity and energy: a flexible wordmark, high-contrast typography, and a colour system that could flex from campaign to product without losing recognition.</p>
                    <h3>Approach</h3>
                    <p>We built a core identity around bold type and simple graphic devices, then stress-tested it across social, out-of-home, and in-gym touchpoints. Motion and layout rules kept executions feeling consistent even when the story changed week to week.</p>
                    <h3>Outcome</h3>
                    <p>A cohesive brand toolkit that internal teams could ship quickly, with guidelines tight enough to protect the idea and loose enough to invite creative iteration.</p>
                `
            }
        };

        function caseStudyKeyFromSrc(src) {
            const path = (src || '').split('?')[0];
            return path.split('/').pop().toLowerCase();
        }

        function getCaseStudyForImg(img) {
            const key = caseStudyKeyFromSrc(img.getAttribute('src'));
            return CASE_STUDIES[key] || null;
        }

        const cursor = document.getElementById('cursor');
        const caseBackdrop = document.getElementById('case-backdrop');
        const casePanel = document.getElementById('case-panel');
        const casePanelTitle = document.getElementById('case-panel-title');
        const casePanelBody = document.getElementById('case-panel-body');
        const casePanelClose = document.getElementById('case-panel-close');

        let isOverLinks = false;
        let isGridMode = false;
        let scatterEls = [];
        let dragEl = null, dragOffsetX = 0, dragOffsetY = 0;
        let scatterGesture = null;
        const dragThresholdPx = 6;

        function openCaseStudy(study) {
            cursor.classList.remove('case-study-hint');
            casePanelTitle.textContent = study.title;
            casePanelBody.innerHTML = study.bodyHtml;
            caseBackdrop.classList.add('is-open');
            casePanel.classList.add('is-open');
            caseBackdrop.setAttribute('aria-hidden', 'false');
            casePanel.setAttribute('aria-hidden', 'false');
            document.body.classList.add('case-panel-open');
            casePanelClose.focus({ preventScroll: true });
        }

        function closeCaseStudy() {
            caseBackdrop.classList.remove('is-open');
            casePanel.classList.remove('is-open');
            caseBackdrop.setAttribute('aria-hidden', 'true');
            casePanel.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('case-panel-open');
            casePanelBody.innerHTML = '';
        }

        casePanelClose.addEventListener('click', closeCaseStudy);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && casePanel.classList.contains('is-open')) {
                closeCaseStudy();
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (scatterGesture && !dragEl) {
                const dx = e.clientX - scatterGesture.startX;
                const dy = e.clientY - scatterGesture.startY;
                if (Math.hypot(dx, dy) > dragThresholdPx) {
                    const img = scatterGesture.img;
                    scatterGesture = null;
                    dragEl = img;
                    img.classList.add('dragging');
                    img.style.zIndex = '19000';
                }
            }
            if (!dragEl) return;
            dragEl.style.left = (e.clientX - dragOffsetX) + 'px';
            dragEl.style.top  = (e.clientY - dragOffsetY) + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (dragEl) {
                dragEl.classList.remove('dragging');
                dragEl = null;
            } else if (scatterGesture) {
                const study = getCaseStudyForImg(scatterGesture.img);
                if (study) openCaseStudy(study);
                scatterGesture = null;
            }
        });

        const toggleBtn = document.getElementById('toggle-btn');

        toggleBtn.addEventListener('click', () => {
            isGridMode = !isGridMode;

            if (isGridMode) {
                const btnRect = toggleBtn.getBoundingClientRect();
                const originX = btnRect.left + btnRect.width  / 2 - 100;
                const originY = btnRect.top  + btnRect.height / 2 - 75;

                [...images].sort(() => Math.random() - 0.5).forEach((src, i) => {
                    const targetX = Math.random() * (window.innerWidth  - 200);
                    const targetY = Math.random() * (window.innerHeight - 150);

                    const img = document.createElement('img');
                    img.src = src;
                    img.classList.add('scatter-img');
                    if (getCaseStudyForImg(img)) {
                        img.classList.add('has-case-study');
                    }
                    img.style.left      = originX + 'px';
                    img.style.top       = originY + 'px';
                    img.style.opacity   = '0';
                    img.style.transform = 'scale(0.05)';
                    img.style.zIndex    = 9000 + i;
                    img.draggable = false;
                    img.addEventListener('dragstart', (e) => e.preventDefault());

                    img.addEventListener('mouseenter', () => {
                        if (!isGridMode || !getCaseStudyForImg(img)) return;
                        cursor.classList.add('case-study-hint');
                    });
                    img.addEventListener('mouseleave', () => {
                        cursor.classList.remove('case-study-hint');
                    });

                    img.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        const r = img.getBoundingClientRect();
                        dragOffsetX = e.clientX - r.left;
                        dragOffsetY = e.clientY - r.top;
                        scatterGesture = { img, startX: e.clientX, startY: e.clientY };
                    });

                    img.addEventListener('touchstart', (e) => {
                        if (e.touches.length !== 1) return;
                        e.stopPropagation();
                        const t = e.touches[0];
                        const r = img.getBoundingClientRect();
                        dragOffsetX = t.clientX - r.left;
                        dragOffsetY = t.clientY - r.top;
                        scatterGesture = { img, startX: t.clientX, startY: t.clientY, touchId: t.identifier };
                    }, { passive: true });

                    img.addEventListener('touchmove', (e) => {
                        if (dragEl === img) {
                            const t = e.touches[0];
                            if (!t) return;
                            e.preventDefault();
                            dragEl.style.left = (t.clientX - dragOffsetX) + 'px';
                            dragEl.style.top  = (t.clientY - dragOffsetY) + 'px';
                            return;
                        }
                        if (!scatterGesture || scatterGesture.img !== img) return;
                        if (scatterGesture.touchId == null) return;
                        const t = [...e.touches].find(x => x.identifier === scatterGesture.touchId);
                        if (!t) return;
                        const dx = t.clientX - scatterGesture.startX;
                        const dy = t.clientY - scatterGesture.startY;
                        if (Math.hypot(dx, dy) > dragThresholdPx) {
                            scatterGesture = null;
                            dragEl = img;
                            img.classList.add('dragging');
                            img.style.zIndex = '19000';
                        }
                    }, { passive: false });

                    img.addEventListener('touchend', (e) => {
                        if (dragEl === img) {
                            dragEl.classList.remove('dragging');
                            dragEl = null;
                            return;
                        }
                        if (scatterGesture && scatterGesture.img === img && scatterGesture.touchId != null) {
                            const lifted = [...e.changedTouches].some(t => t.identifier === scatterGesture.touchId);
                            if (!lifted) return;
                            const study = getCaseStudyForImg(img);
                            if (study) openCaseStudy(study);
                            scatterGesture = null;
                        }
                    });

                    document.body.appendChild(img);
                    scatterEls.push(img);

                    setTimeout(() => {
                        img.style.opacity   = '1';
                        img.style.transform = 'scale(1)';
                        img.style.left = targetX + 'px';
                        img.style.top  = targetY + 'px';
                    }, i * 30);
                });
            } else {
                closeCaseStudy();
                cursor.classList.remove('case-study-hint');
                const btnRect = toggleBtn.getBoundingClientRect();
                const originX = btnRect.left + btnRect.width  / 2 - 100;
                const originY = btnRect.top  + btnRect.height / 2 - 75;

                scatterEls.forEach((img, i) => {
                    setTimeout(() => {
                        img.style.left      = originX + 'px';
                        img.style.top       = originY + 'px';
                        img.style.transform = 'scale(0.05)';
                        img.style.opacity   = '0';
                    }, i * 15);
                    setTimeout(() => img.remove(), i * 15 + 800);
                });
                scatterEls = [];
            }
        });

        toggleBtn.addEventListener('mouseenter', () => {
            cursor.classList.add('over-links');
        });
        toggleBtn.addEventListener('mouseleave', () => {
            cursor.classList.remove('over-links');
        });

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top  = e.clientY + 'px';
        });

        const social = document.querySelector('.social');
        social.addEventListener('mouseenter', () => {
            isOverLinks = true;
            cursor.classList.add('over-links');
        });
        social.addEventListener('mouseleave', () => {
            isOverLinks = false;
            cursor.classList.remove('over-links');
        });

        const threshold = 60;
        const halfX = 100;
        const halfY = 75;
        const baseZIndex = 0;
        const zIndexDirection = 'new-on-top';
        let imageIndex = 0;
        const lastMousePos = { x: 0, y: 0 };
        const activeTrailEls = [];

        function assignZIndices() {
            activeTrailEls.forEach((el, i) => {
                el.style.zIndex = zIndexDirection === 'new-on-top'
                    ? baseZIndex + i
                    : baseZIndex + (activeTrailEls.length - 1 - i);
            });
        }

        // — Trail —
        document.addEventListener('mousemove', (e) => {
            if (isHolding || isOverLinks || isGridMode) return;

            const x = e.clientX;
            const y = e.clientY;
            const dist = Math.hypot(x - lastMousePos.x, y - lastMousePos.y);
            if (dist < threshold) return;

            spawnTrailImage(x, y);

            lastMousePos.x = x;
            lastMousePos.y = y;
        });

        function spawnTrailImage(x, y) {
            const el = document.createElement('img');
            el.src = images[imageIndex % images.length];
            el.style.cssText = `position:fixed;left:0;top:0;width:200px;height:150px;object-fit:cover;pointer-events:none;`;
            document.body.appendChild(el);
            imageIndex++;

            activeTrailEls.push(el);
            assignZIndices();

            const tx = x - halfX;
            const ty = y - halfY;

            el.animate([
                { transform: `translate(${tx}px, ${ty}px)`, opacity: 0, offset: 0    },
                { transform: `translate(${tx}px, ${ty}px)`, opacity: 1, offset: 0.15 },
                { transform: `translate(${tx}px, ${ty}px)`, opacity: 1, offset: 0.85 },
                { transform: `translate(${tx}px, ${ty}px)`, opacity: 0, offset: 1    }
            ], { duration: 2000, easing: 'ease-out', fill: 'forwards' }).onfinish = () => {
                activeTrailEls.splice(activeTrailEls.indexOf(el), 1);
                el.remove();
            };
        }

        // — Audio —
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playPress() {
            const osc  = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        let holdOsc = null, holdGain = null;

        function startHoldSound() {
            holdOsc  = audioCtx.createOscillator();
            holdGain = audioCtx.createGain();
            holdOsc.connect(holdGain); holdGain.connect(audioCtx.destination);
            holdOsc.type = 'sawtooth';
            holdOsc.frequency.setValueAtTime(30, audioCtx.currentTime);
            holdOsc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 3);
            holdGain.gain.setValueAtTime(0, audioCtx.currentTime);
            holdGain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.2);
            holdOsc.start();
        }

        function stopHoldSound() {
            if (!holdOsc) return;
            holdGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            holdOsc.stop(audioCtx.currentTime + 0.1);
            holdOsc = null;
        }

        function playExplosion() {
            const count = 16;
            for (let i = 0; i < count; i++) {
                const t = audioCtx.currentTime + i * 0.035;
                const bufferSize = Math.floor(audioCtx.sampleRate * 0.08);
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let j = 0; j < bufferSize; j++) data[j] = (Math.random() * 2 - 1);

                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                // Bandpass around the "paper crinkle" range
                const bp = audioCtx.createBiquadFilter();
                bp.type = 'bandpass';
                bp.frequency.value = 2500 + Math.random() * 1500;
                bp.Q.value = 0.5 + Math.random() * 1.5;

                // Shelf to cut the harshest highs
                const shelf = audioCtx.createBiquadFilter();
                shelf.type = 'highshelf';
                shelf.frequency.value = 6000;
                shelf.gain.value = -10;

                const gain = audioCtx.createGain();
                const vol = 0.22 * (1 - (i / count) * 0.6);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(vol, t + 0.008);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);

                noise.connect(bp); bp.connect(shelf); shelf.connect(gain); gain.connect(audioCtx.destination);
                noise.start(t);
            }
        }

        // — Click & hold explosion —
        let isHolding = false;
        let holdInterval = null;
        const heldImages = [];
        let holdOrigin = { x: 0, y: 0 };

        let holdSoundTimer = null;
        let holdSoundStarted = false;

        document.addEventListener('mousedown', (e) => {
            if (isGridMode || dragEl) return;
            audioCtx.resume();
            holdSoundStarted = false;
            holdSoundTimer = setTimeout(() => {
                startHoldSound();
                holdSoundStarted = true;
            }, 300);
            isHolding = true;
            cursor.classList.add('holding');
            const cx = e.clientX;
            const cy = e.clientY;
            holdOrigin = { x: cx, y: cy };

            holdInterval = setInterval(() => {
                const ox = (Math.random() - 0.5) * 30;
                const oy = (Math.random() - 0.5) * 30;
                const el = document.createElement('img');
                el.src = images[imageIndex % images.length];
                el.style.cssText = `position:fixed;left:0;top:0;width:200px;height:150px;object-fit:cover;pointer-events:none;z-index:${1000 + heldImages.length};transform:translate(${cx - halfX + ox}px,${cy - halfY + oy}px);`;
                document.body.appendChild(el);
                heldImages.push(el);
                imageIndex++;
            }, 120);
        });

        document.addEventListener('mouseup', () => {
            if (!isHolding) return;
            isHolding = false;
            cursor.classList.remove('holding');
            clearTimeout(holdSoundTimer);
            if (holdSoundStarted) {
                stopHoldSound();
                playExplosion();
            }
            clearInterval(holdInterval);

            heldImages.forEach(el => {
                const angle  = Math.random() * Math.PI * 2;
                const tx = Math.random() * (window.innerWidth  - 200);
                const ty = Math.random() * (window.innerHeight - 150);
                const from   = el.style.transform;
                const dur    = 150 + Math.random() * 100;
                const hold   = 4000 + Math.random() * 3000;

                el.animate([
                    { transform: from,                                      opacity: 1, offset: 0 },
                    { transform: `translate(${tx}px, ${ty}px)`,            opacity: 1, offset: dur / (dur + hold) },
                    { transform: `translate(${tx}px, ${ty}px)`,            opacity: 0, offset: 1 }
                ], { duration: dur + hold, easing: 'cubic-bezier(0.1, 0, 0.3, 1)', fill: 'forwards' })
                .onfinish = () => el.remove();
            });

            heldImages.length = 0;
        });
    </script>
</body>
</html>
