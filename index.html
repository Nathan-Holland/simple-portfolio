<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fff;
            color: #000;
            font-family: Helvetica, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 16px;
            padding: 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .bio {
            max-width: 400px;
        }

        .social a {
            color: #000;
            text-decoration: none;
            display: block;
            text-align: right;
        }

        .social a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="bottom">
        <p class="bio">Nate Holland is a British brand designer based in Barcelona, currently working at Revolut.</p>
        <div class="social">
            <a href="#">LinkedIn</a>
            <a href="#">Email</a>
            <a href="#">X</a>
            <a href="#">Cosmos</a>
        </div>
    </div>
</body>
</html>
